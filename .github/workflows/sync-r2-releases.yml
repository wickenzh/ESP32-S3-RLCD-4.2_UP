name: Sync R2 OTA Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: sync-r2-ota-releases
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync R2 versions to GitHub Releases
        env:
          R2_VERSIONS_URL: ${{ vars.R2_VERSIONS_URL }}
          OTA_RELEASE_KEEP: ${{ vars.OTA_RELEASE_KEEP }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import base64
          import hashlib
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          versions_url = os.environ.get("R2_VERSIONS_URL", "").strip()
          if not versions_url:
              raise SystemExit("Repository variable R2_VERSIONS_URL is not configured")
          keep_raw = os.environ.get("OTA_RELEASE_KEEP", "").strip()
          keep = int(keep_raw) if keep_raw.isdigit() else 10
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          api = f"https://api.github.com/repos/{repo}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "weather-clock-r2-release-sync",
          }

          def http_json(method, url, payload=None, raw=None, extra_headers=None, not_found_none=False, timeout=180):
              req_headers = dict(headers)
              data = raw
              if payload is not None:
                  data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                  req_headers["Content-Type"] = "application/json"
              if extra_headers:
                  req_headers.update(extra_headers)
              for attempt in range(1, 6):
                  req = urllib.request.Request(url, data=data, method=method, headers=req_headers)
                  try:
                      with urllib.request.urlopen(req, timeout=timeout) as response:
                          body = response.read()
                          return json.loads(body.decode("utf-8")) if body else {}
                  except urllib.error.HTTPError as exc:
                      detail = exc.read().decode("utf-8", errors="replace")
                      if exc.code == 404 and not_found_none:
                          return None
                      if attempt == 5 or exc.code not in (408, 429, 500, 502, 503, 504):
                          raise SystemExit(f"GitHub API {method} {url} failed: HTTP {exc.code} {detail}") from exc
                  time.sleep(attempt * 2)
              return None

          def fetch(url, timeout=300):
              fetch_headers = {
                  "User-Agent": "weather-clock-r2-release-sync/1.0",
                  "Accept": "application/json, application/octet-stream;q=0.9, */*;q=0.8",
                  "Cache-Control": "no-cache",
              }
              for attempt in range(1, 6):
                  try:
                      req = urllib.request.Request(url, headers=fetch_headers)
                      with urllib.request.urlopen(req, timeout=timeout) as response:
                          return response.read()
                  except urllib.error.HTTPError as exc:
                      detail = exc.read().decode("utf-8", errors="replace")
                      print(f"fetch failed attempt={attempt} status={exc.code} detail={detail[:200]}")
                      if attempt == 5:
                          raise
                  except Exception as exc:
                      print(f"fetch failed attempt={attempt} error={exc}")
                      if attempt == 5:
                          raise
                  time.sleep(attempt * 2)

          def version_key(version):
              nums = [int(x) for x in re.findall(r"\d+", version)]
              return nums or [0]

          def latest_url_from_versions(url):
              if url.endswith("/versions.json"):
                  return url[:-len("/versions.json")] + "/latest.json"
              return url.rsplit("/", 1)[0] + "/latest.json"

          def put_content(path, content_bytes, message):
              existing = http_json("GET", f"{api}/contents/{path}?ref=main", not_found_none=True)
              payload = {
                  "message": message,
                  "content": base64.b64encode(content_bytes).decode("ascii"),
                  "branch": "main",
              }
              if existing and existing.get("sha"):
                  payload["sha"] = existing["sha"]
              http_json("PUT", f"{api}/contents/{path}", payload)

          data = json.loads(fetch(versions_url, timeout=60).decode("utf-8"))
          items = sorted(data.get("items", []), key=lambda item: version_key(item.get("version", "")), reverse=True)[:keep]
          if not items:
              raise SystemExit("R2 versions.json has no items")
          latest = data.get("latest") or items[0].get("version")
          print(f"Syncing {len(items)} version(s), latest={latest}")

          latest_json_bytes = fetch(latest_url_from_versions(versions_url), timeout=60)
          put_content("firmware/latest.json", latest_json_bytes, f"Sync latest OTA manifest {latest}")
          put_content("firmware/versions.json", json.dumps(data, ensure_ascii=False, indent=2).encode("utf-8") + b"\n", f"Sync OTA versions manifest {latest}")

          readme_lines = [
              "# ESP32-S3 RLCD Weather Clock OTA",
              "",
              "这个仓库是设备 OTA / 上位机固件镜像仓库，不保存固件源码。",
              "",
              "## 当前版本",
              "",
              f"- 最新版本：`{latest}`",
              "- Manifest：`firmware/latest.json`",
              "- 版本清单：`firmware/versions.json`",
              "",
              "## 文件用途",
              "",
              "- `firmware/latest.json`：设备端检查 OTA 时读取的最新版本清单。",
              "- `firmware/versions.json`：上位机读取最近版本列表，包含 app bin 和 merged bin 的 URL、大小和 SHA256。",
              "- GitHub Release 附件 `weather_clock_vX.X.X.bin`：设备 OTA 升级用 app 固件。",
              "- GitHub Release 附件 `weather_clock_vX.X.X_merged.bin`：串口完整刷写镜像，包含 bootloader、分区表、OTA data 和 app。",
              "",
              "## 同步来源",
              "",
              "本仓库由 GitHub Actions 自动从 Cloudflare R2 OTA 存储同步。",
              "",
              "- R2 是设备默认 OTA 下载源。",
              "- GitHub Release 是备份、历史下载和上位机读取的镜像。",
              f"- 每次同步最多保留最近 `{keep}` 个版本。",
              "",
              "## 最近版本",
              "",
          ]
          for entry in items:
              ver = entry.get("version", "")
              notes = entry.get("notes", "")
              app = entry.get("app", {})
              merged = entry.get("merged", {})
              readme_lines.append(f"- `{ver}`：{notes}")
              if app.get("sha256"):
                  readme_lines.append(f"  - app sha256: `{app.get('sha256')}`")
              if merged.get("sha256"):
                  readme_lines.append(f"  - merged sha256: `{merged.get('sha256')}`")
          put_content("README.md", ("\n".join(readme_lines) + "\n").encode("utf-8"), f"Sync OTA README {latest}")
          print("Synced firmware/latest.json, firmware/versions.json and README.md")

          for item in items:
              version = item.get("version")
              if not version:
                  continue
              release = http_json("GET", f"{api}/releases/tags/{version}", not_found_none=True)
              notes = item.get("notes") or "Synced from Cloudflare R2."
              body = (
                  "Synced from Cloudflare R2 OTA storage.\n\n"
                  f"- Version: `{version}`\n"
                  "- App bin: device OTA upgrade image\n"
                  "- Merged bin: complete serial flash image\n\n"
                  f"Notes:\n{notes}\n"
              )
              release_payload = {
                  "name": version,
                  "body": body,
                  "draft": False,
                  "prerelease": False,
              }
              if version == latest:
                  release_payload["make_latest"] = "true"

              if release is None:
                  create_payload = dict(release_payload)
                  create_payload["tag_name"] = version
                  release = http_json("POST", f"{api}/releases", create_payload)
              else:
                  release = http_json("PATCH", f"{api}/releases/{release['id']}", release_payload)

              assets = http_json("GET", f"{api}/releases/{release['id']}/assets") or []
              assets_by_name = {asset.get("name"): asset for asset in assets}
              upload_url = release["upload_url"].split("{")[0]
              for kind, suffix in (("app", ".bin"), ("merged", "_merged.bin")):
                  meta = item.get(kind) or {}
                  url = meta.get("url")
                  sha_expected = (meta.get("sha256") or "").lower()
                  size_expected = int(meta.get("size") or 0)
                  if not url or not sha_expected:
                      print(f"skip {version} {kind}: missing url or sha256")
                      continue
                  name = f"weather_clock_{version}{suffix}"
                  existing = assets_by_name.get(name)
                  if existing and size_expected and int(existing.get("size") or 0) == size_expected:
                      print(f"kept {version} {name}")
                      continue
                  blob = fetch(url)
                  sha_actual = hashlib.sha256(blob).hexdigest()
                  if sha_actual != sha_expected:
                      raise SystemExit(f"sha256 mismatch for {name}: {sha_actual} != {sha_expected}")
                  if size_expected and len(blob) != size_expected:
                      raise SystemExit(f"size mismatch for {name}: {len(blob)} != {size_expected}")
                  if existing:
                      http_json("DELETE", f"{api}/releases/assets/{existing['id']}")
                      print(f"deleted stale {version} {name}")
                  encoded_name = urllib.parse.urlencode({"name": name})
                  http_json("POST", f"{upload_url}?{encoded_name}", raw=blob, extra_headers={"Content-Type": "application/octet-stream"}, timeout=300)
                  print(f"uploaded {version} {name} ({len(blob)} bytes)")

          print("R2 OTA Release sync complete")
          PY
